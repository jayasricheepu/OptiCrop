<!DOCTYPE html>
<html>
<head>
    <title>OptiCrop - Crop Recommendation</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f9f4;
            text-align:center;
            margin-top:40px;
        }

        .container{
            width:400px;
            margin:auto;
            padding:25px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            color:green;
        }

        input{
            width:90%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:95%;
            padding:10px;
            background:green;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:darkgreen;
        }

        h2{
            color:blue;
            margin-top:20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🌱 OptiCrop</h1>
    <h3>Crop Recommendation System</h3>

    <form action="/predict" method="POST">

        <input type="number" name="N" placeholder="Nitrogen" required>

        <input type="number" name="P" placeholder="Phosphorus" required>

        <input type="number" name="K" placeholder="Potassium" required>

        <input type="number" step="any" name="temperature" placeholder="Temperature" required>

        <input type="number" step="any" name="humidity" placeholder="Humidity" required>

        <input type="number" step="any" name="ph" placeholder="pH" required>

        <input type="number" step="any" name="rainfall" placeholder="Rainfall" required>

        <button type="submit">Predict Crop</button>

    </form>

    {% if prediction %}
        <h2>🌾 Recommended Crop: {{ prediction }}</h2>
    {% endif %}

</div>

</body>
</html>
